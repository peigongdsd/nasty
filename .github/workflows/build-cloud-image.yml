name: Build NASty Cloud Image

on:
  workflow_dispatch:

jobs:
  build-cloud-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Inject GitHub token for updates
        run: |
          echo "${{ secrets.NASTY_GITHUB_TOKEN }}" > nixos/github-token
          git add nixos/github-token

      - name: Compute npm deps hash
        run: |
          HASH=$(nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json 2>/dev/null)
          sed -i "s|npmDepsHash = \".*\"|npmDepsHash = \"$HASH\"|" nixos/flake.nix
          git add nixos/flake.nix

      - name: Build QCOW2 image
        run: |
          set -o pipefail
          cd nixos
          nix build .#nasty-cloud-image \
            --no-link --print-out-paths -L 2>&1 | tee /tmp/build.log
          grep '^/nix/store' /tmp/build.log | tail -1 > /tmp/image-path.txt
          cat /tmp/image-path.txt

      - name: Prepare image
        run: |
          IMAGE_DIR=$(cat /tmp/image-path.txt)
          IMAGE_FILE=$(find "$IMAGE_DIR" -name "*.qcow2" -type f | head -1)
          echo "Image: $IMAGE_FILE"
          ls -lh "$IMAGE_FILE"

          SHORT_SHA=$(git rev-parse --short HEAD)
          DEST="nasty-cloud-x86_64-${SHORT_SHA}.qcow2"
          cp "$IMAGE_FILE" "$DEST"
          echo "image_dest=$DEST" >> "$GITHUB_ENV"

      - name: Upload as release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="cloud-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          gh release create "$TAG" "${{ env.image_dest }}" \
            --title "NASty Cloud Image $TAG" \
            --notes "Automated QCOW2 build from commit $(git rev-parse --short HEAD)"
