name: Build NASty Cloud Image (x86_64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Inject GitHub token for updates
        run: |
          echo "${{ secrets.NASTY_GITHUB_TOKEN }}" > nixos/github-token
          git add nixos/github-token

      - name: Compute npm deps hash
        run: |
          HASH=$(nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json 2>/dev/null)
          sed -i "s|npmDepsHash = \".*\"|npmDepsHash = \"$HASH\"|" nixos/flake.nix
          git add nixos/flake.nix

      - name: Build disk image
        run: |
          cd nixos
          nix build .#packages.x86_64-linux.nasty-cloud-image \
            --print-out-paths -L
          echo "image_store=$(readlink -f result)" >> "$GITHUB_ENV"

      - name: Install tools
        run: sudo apt-get install -y p7zip-full qemu-utils

      - name: Prepare image
        run: |
          RAW_FILE=$(find "${{ env.image_store }}" -type f \( -name "*.img" -o -name "*.raw" \) | head -1)
          echo "Image: $RAW_FILE"
          ls -lh "$RAW_FILE"

          qemu-img convert -f raw -O qcow2 -c "$RAW_FILE" /tmp/nasty.qcow2
          ls -lh /tmp/nasty.qcow2

          SHORT_SHA=$(git rev-parse --short HEAD)
          DEST="nasty-cloud-x86_64-${SHORT_SHA}.qcow2.7z"
          7z a -mx=9 "$DEST" /tmp/nasty.qcow2
          ls -lh "$DEST"
          echo "image_dest=$DEST" >> "$GITHUB_ENV"

      - name: Upload as release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="cloud-$(date +%Y%m%d)-${SHORT_SHA}"
          gh release create "$TAG" "${{ env.image_dest }}" \
            --title "NASty Cloud Image $TAG" \
            --notes "Automated QCOW2 build from commit ${SHORT_SHA}. x86_64 only — aarch64 images are built locally."
