name: Build NASty Cloud Image

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture to build'
        type: choice
        options:
          - both
          - x86_64
          - aarch64
        default: both

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            nix_system: x86_64-linux
          - arch: aarch64
            nix_system: aarch64-linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Skip if not selected
        id: check
        run: |
          if [[ "${{ inputs.arch }}" != "both" && "${{ inputs.arch }}" != "${{ matrix.arch }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Add swap space
        if: matrix.arch == 'aarch64' && steps.check.outputs.skip != 'true'
        run: |
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "Swap enabled: $(swapon --show)"

      - uses: actions/checkout@v5
        if: steps.check.outputs.skip != 'true'

      - uses: cachix/install-nix-action@v31
        if: steps.check.outputs.skip != 'true'
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            system-features = nixos-test benchmark big-parallel kvm
            extra-platforms = aarch64-linux

      - name: Set up QEMU for aarch64
        if: matrix.arch == 'aarch64' && steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo systemctl restart systemd-binfmt

      - name: Inject GitHub token for updates
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "${{ secrets.NASTY_GITHUB_TOKEN }}" > nixos/github-token
          git add nixos/github-token

      - name: Compute npm deps hash
        if: steps.check.outputs.skip != 'true'
        run: |
          HASH=$(nix run nixpkgs#prefetch-npm-deps -- webui/package-lock.json 2>/dev/null)
          sed -i "s|npmDepsHash = \".*\"|npmDepsHash = \"$HASH\"|" nixos/flake.nix
          git add nixos/flake.nix

      - name: Build QCOW2 image (${{ matrix.arch }})
        if: steps.check.outputs.skip != 'true'
        run: |
          cd nixos
          nix build .#packages.${{ matrix.nix_system }}.nasty-cloud-image \
            --print-out-paths -L \
            ${{ matrix.arch == 'aarch64' && '--cores 1' || '' }}
          echo "image_store=$(readlink -f result)" >> "$GITHUB_ENV"

      - name: Install 7zip
        if: steps.check.outputs.skip != 'true'
        run: sudo apt-get install -y p7zip-full

      - name: Prepare image
        if: steps.check.outputs.skip != 'true'
        run: |
          IMAGE_FILE=$(find "${{ env.image_store }}" -name "*.qcow2" -type f | head -1)
          echo "Image: $IMAGE_FILE"
          ls -lh "$IMAGE_FILE"

          SHORT_SHA=$(git rev-parse --short HEAD)
          DEST="nasty-cloud-${{ matrix.arch }}-${SHORT_SHA}.qcow2.7z"
          7z a -mx=9 "$DEST" "$IMAGE_FILE"
          ls -lh "$DEST"
          echo "image_dest=$DEST" >> "$GITHUB_ENV"

      - name: Upload as release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="cloud-$(date +%Y%m%d)-${SHORT_SHA}"

          # Create release if it doesn't exist yet (first arch to finish creates it)
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "NASty Cloud Image $TAG" \
              --notes "Automated QCOW2 build from commit ${SHORT_SHA}"

          # Upload this architecture's image
          gh release upload "$TAG" "${{ env.image_dest }}"
