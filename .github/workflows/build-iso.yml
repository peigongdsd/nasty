name: Build NASty ISO

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build x86_64 ISO
        run: |
          set -o pipefail
          cd nixos
          nix build .#nixosConfigurations.nasty-iso.config.system.build.isoImage \
            --no-link --print-out-paths -L 2>&1 | tee /tmp/build.log
          grep '^/nix/store' /tmp/build.log | tail -1 > /tmp/iso-path.txt
          cat /tmp/iso-path.txt

      - name: Prepare ISO
        run: |
          ISO_DIR=$(cat /tmp/iso-path.txt)
          ISO_FILE=$(find "$ISO_DIR" -name "*.iso" -type f | head -1)
          echo "ISO: $ISO_FILE"
          ls -lh "$ISO_FILE"

          # Copy to workspace with a clean name
          SHORT_SHA=$(git rev-parse --short HEAD)
          DEST="nasty-x86_64-${SHORT_SHA}.iso"
          cp "$ISO_FILE" "$DEST"
          echo "iso_dest=$DEST" >> "$GITHUB_ENV"

      - name: Upload as release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="iso-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          gh release create "$TAG" "${{ env.iso_dest }}" \
            --title "NASty ISO $TAG" \
            --notes "Automated ISO build from commit $(git rev-parse --short HEAD)"
